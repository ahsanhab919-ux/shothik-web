version: "2"
type: frontend
tech_stack:
  - TypeScript
  - JavaScript
  - Next.js App Router
  - React
  - Radix UI
  - Redux Toolkit
  - Vitest
  - Playwright
  - InsForge SDK
routes:
  - path: /
    file: app/(primary-layout)/(home)/page.jsx
    auth_required: false
    description: Public marketing and landing page.
  - path: /auth/login
    file: app/auth/login/page.tsx
    auth_required: false
    description: User sign-in page for email and password authentication.
  - path: /auth/register
    file: app/auth/register/page.tsx
    auth_required: false
    description: User registration page.
  - path: /auth/forgot-password
    file: app/auth/forgot-password/page.tsx
    auth_required: false
    description: Password recovery initiation flow.
  - path: /auth/post-login
    file: app/auth/post-login/page.tsx
    auth_required: true
    description: Authenticated redirect decision page after successful login.
  - path: /dashboard
    file: app/dashboard/page.tsx
    auth_required: true
    description: Compatibility redirect route into post-login flow.
  - path: /agents
    file: app/(primary-layout)/agents/page.jsx
    auth_required: false
    description: Agent listing and discovery page.
  - path: /agents/chat
    file: app/(primary-layout)/agents/chat/page.tsx
    auth_required: true
    description: Authenticated Shothik AI chat workspace.
  - path: /agents/profile/[agentId]
    file: app/(primary-layout)/agents/profile/[agentId]/page.tsx
    auth_required: false
    description: Public or shared agent profile page.
  - path: /account
    file: app/(primary-layout)/account/page.tsx
    auth_required: true
    description: User account overview.
  - path: /account/billing
    file: app/(primary-layout)/account/billing/page.tsx
    auth_required: true
    description: Billing and subscription management page.
  - path: /paraphrase
    file: app/(primary-layout)/paraphrase/page.tsx
    auth_required: false
    description: Paraphrasing tool UI.
  - path: /humanize-gpt
    file: app/(primary-layout)/humanize-gpt/page.tsx
    auth_required: false
    description: Humanizer tool UI.
  - path: /summarize
    file: app/(primary-layout)/summarize/page.tsx
    auth_required: false
    description: Summarizer tool UI.
  - path: /translator
    file: app/(primary-layout)/translator/page.tsx
    auth_required: false
    description: Translation tool UI.
  - path: /ai-detector
    file: app/(primary-layout)/ai-detector/page.tsx
    auth_required: false
    description: AI detector tool UI.
  - path: /grammar-checker
    file: app/(primary-layout)/grammar-checker/page.tsx
    auth_required: false
    description: Grammar checking tool UI.
  - path: /research
    file: app/(primary-layout)/research/page.jsx
    auth_required: true
    description: Research workspace.
  - path: /writing-studio
    file: app/(primary-layout)/writing-studio/page.jsx
    auth_required: true
    description: Writing studio workspace.
  - path: /marketplace
    file: app/(primary-layout)/marketplace/page.tsx
    auth_required: false
    description: Marketplace and store browsing page.
  - path: /books/[bookId]
    file: app/(primary-layout)/books/[bookId]/page.tsx
    auth_required: false
    description: Book detail page for marketplace and library access flows.
  - path: /community
    file: app/(primary-layout)/community/page.tsx
    auth_required: true
    description: Community feed for human and agent interaction.
  - path: /explore/channels
    file: app/(primary-layout)/explore/channels/page.tsx
    auth_required: false
    description: Channel discovery page.
  - path: /pricing
    file: app/(secondary-layout)/pricing/page.tsx
    auth_required: false
    description: Pricing and plan comparison page.
  - path: /pricing/checkout
    file: app/(secondary-layout)/pricing/checkout/page.tsx
    auth_required: true
    description: Checkout initiation page for pricing plans.
  - path: /api-docs
    file: app/api-docs/page.tsx
    auth_required: false
    description: API documentation surface.
features:
  - name: User authentication
    description: Email and password sign-in, sign-up, password recovery, and post-login redirect handling.
    files:
      - app/auth/login/page.tsx
      - app/auth/register/page.tsx
      - app/auth/forgot-password/page.tsx
      - app/auth/post-login/page.tsx
      - app/api/auth/sign-in/route.ts
      - app/api/auth/sign-up/route.ts
      - app/api/auth/sign-out/route.ts
      - proxy.ts
    entry_route: /auth/login
    user_interactions:
      - Fill the email field.
      - Fill the password field.
      - Submit sign-in with the continue button.
      - Follow the post-login redirect into the authenticated destination.
      - Use forgot-password flow when credentials are unavailable.
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-in
      - method: POST
        endpoint: /api/auth/sign-up
      - method: POST
        endpoint: /api/auth/sign-out
    auth_required: false
  - name: Agent chat workspace
    description: Authenticated users chat with Shothik AI and access conversation history.
    files:
      - app/(primary-layout)/agents/chat/page.tsx
      - app/api/chat/route.ts
      - app/api/chat/conversations/route.ts
      - e2e/smoke.spec.ts
    entry_route: /agents/chat
    user_interactions:
      - Navigate to the chat workspace after login.
      - Enter a prompt in the chat input.
      - Review conversation history and agent header information.
      - Open the debug log control when available.
    api_calls:
      - method: POST
        endpoint: /api/chat
      - method: GET
        endpoint: /api/chat/conversations
    auth_required: true
  - name: Legacy writing tools
    description: Public and freemium writing-assistance tools including paraphrase, humanizer, summarizer, translator, AI detector, and grammar.
    files:
      - app/(primary-layout)/paraphrase/page.tsx
      - app/(primary-layout)/humanize-gpt/page.tsx
      - app/(primary-layout)/summarize/page.tsx
      - app/(primary-layout)/translator/page.tsx
      - app/(primary-layout)/ai-detector/page.tsx
      - app/(primary-layout)/grammar-checker/page.tsx
      - app/api/tools/paraphrase/route.ts
      - app/api/humanizerV5/route.ts
      - app/api/tools/summarize/route.ts
      - app/api/tools/translator/route.ts
      - app/api/tools/ai-detector/route.ts
      - app/api/tools/grammar/route.ts
    entry_route: /paraphrase
    user_interactions:
      - Open a tool page from the main navigation.
      - Enter or paste content into the tool editor.
      - Submit the tool action.
      - Review transformed or analyzed output.
    api_calls:
      - method: POST
        endpoint: /api/tools/paraphrase
      - method: POST
        endpoint: /api/humanizerV5
      - method: POST
        endpoint: /api/tools/summarize
      - method: POST
        endpoint: /api/tools/translator
      - method: POST
        endpoint: /api/tools/ai-detector
      - method: POST
        endpoint: /api/tools/grammar
    auth_required: false
  - name: Research and writing workspaces
    description: Authenticated workspaces for long-form writing, research, and related productivity flows.
    files:
      - app/(primary-layout)/research/page.jsx
      - app/(primary-layout)/writing-studio/page.jsx
      - app/api/books/manuscript/route.ts
      - app/api/writing-studio/quality-check/route.ts
    entry_route: /writing-studio
    user_interactions:
      - Open a workspace from the authenticated app shell.
      - Create or edit long-form content.
      - Trigger quality-check or manuscript-related actions.
      - Save and revisit in-progress work.
    api_calls:
      - method: POST
        endpoint: /api/books/manuscript
      - method: POST
        endpoint: /api/writing-studio/quality-check
    auth_required: true
  - name: Marketplace and books
    description: Users browse marketplace items, view books, and prepare for library or purchase flows.
    files:
      - app/(primary-layout)/marketplace/page.tsx
      - app/(primary-layout)/books/[bookId]/page.tsx
      - app/api/book/route.ts
      - app/api/book/[id]/route.ts
      - app/api/publish/submit/route.ts
    entry_route: /marketplace
    user_interactions:
      - Browse marketplace listings.
      - Open a book detail page.
      - Review publishing or ownership-related states.
      - Move toward purchase or publishing workflows.
    api_calls:
      - method: GET
        endpoint: /api/book
      - method: GET
        endpoint: /api/book/[id]
      - method: POST
        endpoint: /api/publish/submit
    auth_required: false
  - name: Community and channels
    description: Community interaction surfaces where users and agents participate in shared discussions and channels.
    files:
      - app/(primary-layout)/community/page.tsx
      - app/(primary-layout)/community/[forumId]/page.tsx
      - app/(primary-layout)/explore/channels/page.tsx
      - app/(primary-layout)/explore/channels/[slug]/page.tsx
      - app/api/twin/forum/route.ts
    entry_route: /community
    user_interactions:
      - Browse community topics or channels.
      - Open a forum or channel detail page.
      - Read or contribute to shared discussions.
    api_calls:
      - method: GET
        endpoint: /api/twin/forum
      - method: POST
        endpoint: /api/twin/forum
    auth_required: true
  - name: Platform health and docs
    description: Operational endpoints used for smoke tests and environment verification.
    files:
      - app/api/health/route.ts
      - app/api/docs/swagger.json/route.ts
      - e2e/smoke.spec.ts
    entry_route: /api-docs
    user_interactions:
      - Open API docs.
      - Check application health endpoints.
      - Verify protected or public route responses during smoke testing.
    api_calls:
      - method: GET
        endpoint: /api/health
      - method: GET
        endpoint: /api/docs/swagger.json
    auth_required: false
known_limitations:
  - issue: Production rollout is still blocked because required Vercel production environment variables are not configured.
    location: docs/insforge-chat-auth-rollout.md
    impact: Auth/chat production promotion and post-cutover automation cannot be executed yet.
  - issue: Authenticated protected-preview smoke coverage requires operator-supplied preview bypass and test credentials.
    location: e2e/smoke.spec.ts
    impact: Browser automation for protected preview environments remains environment-gated.
  - issue: Several product areas do not yet have dedicated end-to-end smoke journeys beyond the core auth/chat suite.
    location: docs/delivery/shothik-delivery-matrix.csv
    impact: Broader browser automation coverage is incomplete across legacy tools, marketplace, community, and publishing flows.
